services:
  mysql:
    image: mysql:8.4
    container_name: jobcopilot_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jobcopilot}
      MYSQL_USER: ${MYSQL_USER:-jobcopilot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: jobcopilot_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.10-slim}
    container_name: jobcopilot_backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com}
      MIMO_API_KEY: ${MIMO_API_KEY:-}
      MIMO_V2_PRO_API_KEY: ${MIMO_V2_PRO_API_KEY:-}
      MIMO_BASE_URL: ${MIMO_BASE_URL:-https://api.xiaomimimo.com/v1}
      MIMO_MODEL: ${MIMO_MODEL:-mimo-v2-pro}
      MIMO_MAP_MODEL: ${MIMO_MAP_MODEL:-}
      MIMO_REWRITE_MODEL: ${MIMO_REWRITE_MODEL:-}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-jobcopilot}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-jobcopilot}?charset=utf8mb4
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      GEO_AMAP_KEY: ${GEO_AMAP_KEY:-}
      GEO_TENCENT_KEY: ${GEO_TENCENT_KEY:-}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS}
      ENABLE_CHAT: ${ENABLE_CHAT:-false}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-nowcoder_interview_questions_v1}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai_compatible}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      RERANK_ENABLED: ${RERANK_ENABLED:-true}
      RERANK_MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-https://api.siliconflow.cn/v1}
      RERANK_API_KEY: ${RERANK_API_KEY:-}
      RERANK_TIMEOUT_SECONDS: ${RERANK_TIMEOUT_SECONDS:-15}
      RERANK_CANDIDATE_POOL: ${RERANK_CANDIDATE_POOL:-40}
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.27-alpine}
        VITE_ENABLE_JOBS: ${VITE_ENABLE_JOBS:-false}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
        NPM_REGISTRY_FALLBACK: ${NPM_REGISTRY_FALLBACK:-https://registry.npmmirror.com/}
    container_name: jobcopilot_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  qdrant_data:
