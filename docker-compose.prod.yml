services:
  mysql:
    image: mysql:8.4
    container_name: jobcopilot_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jobcopilot}
      MYSQL_USER: ${MYSQL_USER:-jobcopilot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: jobcopilot_backend
    restart: unless-stopped
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com}
      MIMO_API_KEY: ${MIMO_API_KEY:-}
      MIMO_V2_PRO_API_KEY: ${MIMO_V2_PRO_API_KEY:-}
      MIMO_BASE_URL: ${MIMO_BASE_URL:-https://api.xiaomimimo.com/v1}
      MIMO_MODEL: ${MIMO_MODEL:-mimo-v2-pro}
      MIMO_MAP_MODEL: ${MIMO_MAP_MODEL:-}
      MIMO_REWRITE_MODEL: ${MIMO_REWRITE_MODEL:-}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-jobcopilot}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-jobcopilot}?charset=utf8mb4
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      GEO_AMAP_KEY: ${GEO_AMAP_KEY:-}
      GEO_TENCENT_KEY: ${GEO_TENCENT_KEY:-}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS}
      ENABLE_CHAT: ${ENABLE_CHAT:-false}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_ENABLE_JOBS: ${VITE_ENABLE_JOBS:-false}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
        NPM_REGISTRY_FALLBACK: ${NPM_REGISTRY_FALLBACK:-https://registry.npmmirror.com/}
    container_name: jobcopilot_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
