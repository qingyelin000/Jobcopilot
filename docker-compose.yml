services:
  mysql:
    image: mysql:8.4
    container_name: jobcopilot_mysql_dev
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: jobcopilot_qdrant_dev
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: jobcopilot_redis_dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_dev_data:/data

  backend:
    build:
      context: ./backend
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.10-slim}
    container_name: jobcopilot_backend
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - MIMO_API_KEY=${MIMO_API_KEY:-}
      - MIMO_V2_PRO_API_KEY=${MIMO_V2_PRO_API_KEY:-}
      - MIMO_BASE_URL=${MIMO_BASE_URL:-https://api.xiaomimimo.com/v1}
      - MIMO_MODEL=${MIMO_MODEL:-mimo-v2-pro}
      - MIMO_MAP_MODEL=${MIMO_MAP_MODEL:-}
      - MIMO_REWRITE_MODEL=${MIMO_REWRITE_MODEL:-}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES}
      - GEO_AMAP_KEY=${GEO_AMAP_KEY}
      - GEO_TENCENT_KEY=${GEO_TENCENT_KEY}
      - FRONTEND_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:8501,http://127.0.0.1:8501
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-nowcoder_interview_questions_v1}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai_compatible}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-m3}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - RERANK_ENABLED=${RERANK_ENABLED:-true}
      - RERANK_MODEL=${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      - RERANK_BASE_URL=${RERANK_BASE_URL:-https://api.siliconflow.cn/v1}
      - RERANK_API_KEY=${RERANK_API_KEY:-}
      - RERANK_TIMEOUT_SECONDS=${RERANK_TIMEOUT_SECONDS:-15}
      - RERANK_CANDIDATE_POOL=${RERANK_CANDIDATE_POOL:-40}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ENABLE_RATE_LIMIT=${ENABLE_RATE_LIMIT:-true}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - CHAT_RATE_LIMIT_USER_PER_WINDOW=${CHAT_RATE_LIMIT_USER_PER_WINDOW:-20}
      - CHAT_RATE_LIMIT_IP_PER_WINDOW=${CHAT_RATE_LIMIT_IP_PER_WINDOW:-60}
      - PROCESS_START_RATE_LIMIT_USER_PER_WINDOW=${PROCESS_START_RATE_LIMIT_USER_PER_WINDOW:-3}
      - PROCESS_START_RATE_LIMIT_IP_PER_WINDOW=${PROCESS_START_RATE_LIMIT_IP_PER_WINDOW:-8}
      - INTERVIEW_ANSWER_RATE_LIMIT_USER_PER_WINDOW=${INTERVIEW_ANSWER_RATE_LIMIT_USER_PER_WINDOW:-30}
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.27-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
        NPM_REGISTRY_FALLBACK: ${NPM_REGISTRY_FALLBACK:-https://registry.npmmirror.com/}
    container_name: jobcopilot_frontend
    ports:
      - "8501:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_dev_data:
  qdrant_dev_data:
  redis_dev_data:
